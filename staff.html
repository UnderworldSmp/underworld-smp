<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Underworld SMP • Staff Team</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050508;
--card:#0d0d15;
--border:#1b1b28;
--red:#ff3333;
--text:#f5f5f7;
--muted:#9d9daa;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Space Grotesk',sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
left:-50%;
top:-50%;
background:
radial-gradient(circle at 30% 30%,rgba(255,51,51,.08),transparent 20%),
radial-gradient(circle at 70% 70%,rgba(255,51,51,.05),transparent 30%);
animation:rotateBg 30s linear infinite;
z-index:-2;
}

@keyframes rotateBg{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

header{
text-align:center;
padding:90px 20px 40px;
animation:fadeUp 1s ease;
}

header h1{
font-family:'Cinzel',serif;
font-size:4rem;
text-shadow:0 0 25px rgba(255,51,51,.35);
}

header p{
color:var(--muted);
margin-top:10px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.staff-card{
background:rgba(13,13,21,.85);
backdrop-filter:blur(12px);
border:1px solid var(--border);
border-radius:24px;
padding:35px;
animation:fadeUp 1.2s ease;
box-shadow:0 0 40px rgba(255,51,51,.08);
}

.staff-row{
display:flex;
justify-content:space-between;
padding:18px 0;
border-bottom:1px solid var(--border);
transition:.3s;
}

.staff-row:last-child{
border-bottom:none;
}

.staff-row:hover{
transform:translateX(8px);
}

.rank{
color:var(--red);
font-weight:700;
}

.back-btn{
display:inline-block;
margin-top:30px;
padding:14px 24px;
background:white;
color:black;
text-decoration:none;
border-radius:12px;
font-weight:600;
transition:.3s;
}

.back-btn:hover{
transform:translateY(-3px);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:768px){
header h1{
font-size:2.8rem;
}
}
</style>
</head>

<body>

<header>
<h1>Staff Team</h1>
<p>The people who keep Underworld SMP running.</p>
</header>

<div class="container">

<div class="staff-card">

<div class="staff-row">
<span class="rank">👑 Owner</span>
<span>Mr Durden YT</span>
</div>

<div class="staff-row">
<span class="rank">⚔ Administrator</span>
<span>Locked On</span>
</div>

<div class="staff-row">
<span class="rank">🛡 Moderator</span>
<span>Aydhin</span>
</div>

<div class="staff-row">
<span class="rank">🛡 Moderator</span>
<span>Uw Madara</span>
</div>

<div class="staff-row">
<span class="rank">🎮 Helper</span>
<span>Decrease</span>
</div>

</div>

<center>
<a href="index.html" class="back-btn">← Return Home</a>
</center>

</div>

</body>
</html>
